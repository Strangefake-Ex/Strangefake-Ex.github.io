<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Round Table - Empowering Group Discussion</title>
    
    <!-- 字体加载 -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 核心库 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Cormorant Garamond"', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        gold: { DEFAULT: '#D4AF37', light: '#F1E5AC' },
                        medieval: { indigo: '#1E1B4B' },
                        parchment: '#F5F2ED',
                    }
                }
            }
        }
    </script>

    <style>
        html { scroll-behavior: smooth; }
        body { background-color: #F5F2ED; color: #1E1B4B; font-family: 'Inter', sans-serif; margin: 0; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }
        .wax-seal {
            width: 3rem; height: 3rem; border-radius: 50%;
            background: #B91C1C; display: flex; align-items: center; justify-content: center;
            border: 4px solid #991B1B; position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 4px 10px rgba(0,0,0,0.3);
        }
        .medieval-banner {
            position: relative; padding: 1rem 2rem; background: #1E1B4B; color: #D4AF37;
            font-family: "Cormorant Garamond", serif; font-weight: bold; font-style: italic;
            clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 50% 85%, 0% 100%);
        }
        #loader {
            position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
            background: #F5F2ED; z-index: 100; font-family: serif; font-style: italic;
        }
    </style>
</head>
<body>
    <div id="loader">正在开启圆桌会议... (Loading...)</div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // 安全获取图标的组件
        const Icon = ({ name, size = 24, className = "" }) => {
            const LucideIcon = LucideReact[name];
            return LucideIcon ? <LucideIcon size={size} className={className} /> : null;
        };

        const SectionHeader = ({ title, subtitle, iconName }) => (
            <div className="text-center mb-16 relative">
                <div className="inline-block mb-6">
                    <div className="medieval-banner shadow-2xl transform -rotate-1">
                        <div className="flex items-center gap-4 px-4">
                            <Icon name={iconName} className="text-gold" />
                            <span className="text-xl">{title}</span>
                        </div>
                    </div>
                </div>
                {subtitle && <p className="text-slate-500 max-w-2xl mx-auto font-sans mt-4">{subtitle}</p>}
            </div>
        );

        const TeamMember = ({ name, id, role, image }) => (
            <div className="glass-panel rounded-3xl p-8 text-center relative overflow-hidden group border-2 border-transparent hover:border-gold/30 transition-all hover:-translate-y-2">
                <div className="absolute top-4 right-4 wax-seal scale-75 opacity-0 group-hover:opacity-100 transition-opacity">
                    <Icon name="Shield" size={16} className="text-gold-light" />
                </div>
                <img src={image} className="w-24 h-24 mx-auto rounded-full object-cover mb-5 border-4 border-gold/20 group-hover:border-gold transition-colors" alt={name} />
                <h3 className="text-xl font-serif font-bold text-medieval-indigo">{name}</h3>
                <p className="text-sm text-slate-500 mt-2">ID: {id}</p>
                <p className="text-sm text-gold font-semibold mt-1 uppercase tracking-wider">{role}</p>
            </div>
        );

        function App() {
            useEffect(() => {
                document.getElementById('loader').style.display = 'none';
            }, []);

            return (
                <div className="min-h-screen selection:bg-gold/30">
                    {/* 背景装饰 */}
                    <div className="fixed inset-0 z-[-1] opacity-[0.03]" style={{ backgroundImage: 'radial-gradient(#1E1B4B 1px, transparent 1px)', backgroundSize: '40px 40px' }} />

                    {/* 导航 */}
                    <nav className="fixed top-0 w-full z-50 px-6 py-4">
                        <div className="max-w-7xl mx-auto glass-panel rounded-full px-8 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <Icon name="Shield" className="text-gold" />
                                <span className="font-serif font-bold text-xl italic">Round Table</span>
                            </div>
                            <div className="hidden md:flex gap-8 text-xs font-bold uppercase tracking-widest">
                                <a href="#motivation" className="hover:text-gold">动机</a>
                                <a href="#research" className="hover:text-gold">研究</a>
                                <a href="#personas" className="hover:text-gold">画像</a>
                                <a href="#prototype" className="hover:text-gold">原型</a>
                                <a href="#team" className="hover:text-gold">团队</a>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto px-6 pt-32 pb-20 space-y-32">
                        {/* Hero */}
                        <section className="text-center py-20">
                            <div className="wax-seal mx-auto mb-8 scale-150 shadow-2xl">
                                <Icon name="Shield" size={24} className="text-gold-light" />
                            </div>
                            <h1 className="text-7xl md:text-9xl font-serif font-bold text-medieval-indigo italic tracking-tighter">Round Table</h1>
                            <p className="text-xl text-slate-500 font-serif italic mt-6">"让每一位沉默的骑士，在数字圆桌上都能找到属于自己的声音。"</p>
                        </section>

                        {/* Motivation */}
                        <section id="motivation" className="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
                            <div className="space-y-8">
                                <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-gold/10 text-gold font-bold text-xs uppercase border border-gold/20">
                                    <Icon name="Lightbulb" size={16} /> 皇家法令
                                </div>
                                <h2 className="text-5xl font-serif font-bold text-medieval-indigo">追求平等的对话</h2>
                                <p className="text-lg text-slate-600 italic font-serif leading-relaxed">
                                    "在现代研讨会中，沉默并不总是金子。它往往是焦虑、语言压力和对评判的恐惧。"
                                </p>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="glass-panel p-4 rounded-2xl border-l-4 border-gold">
                                        <h4 className="font-bold text-sm">面子保护</h4>
                                        <p className="text-xs text-slate-500">降低公开演讲压力</p>
                                    </div>
                                    <div className="glass-panel p-4 rounded-2xl border-l-4 border-gold">
                                        <h4 className="font-bold text-sm">AI 辅助</h4>
                                        <p className="text-xs text-slate-500">实时翻译与脚手架</p>
                                    </div>
                                </div>
                            </div>
                            <div className="aspect-video rounded-[40px] bg-medieval-indigo overflow-hidden shadow-2xl relative border-4 border-gold/20">
                                <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=800" className="w-full h-full object-cover opacity-40" />
                                <div className="absolute inset-0 flex flex-col items-center justify-center text-white p-8">
                                    <Icon name="Shield" size={64} className="text-gold mb-4" />
                                    <h3 className="text-3xl font-serif font-bold italic">Equality in Dialogue</h3>
                                </div>
                            </div>
                        </section>

                        {/* Research */}
                        <section id="research">
                            <SectionHeader title="智慧卷轴" subtitle="来自 XJTLU 研讨会一线的调研洞察。" iconName="Search" />
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-12">
                                <div className="glass-panel rounded-3xl p-10 space-y-8 border-t-4 border-gold">
                                    <h3 className="text-2xl font-serif font-bold flex items-center gap-3"><Icon name="BarChart3" className="text-gold" /> 调研亮点</h3>
                                    <div className="space-y-6">
                                        <div>
                                            <div className="flex justify-between text-sm font-bold mb-2"><span>对英语流利度的焦虑</span><span>85%</span></div>
                                            <div className="w-full bg-slate-200 h-2 rounded-full"><div className="bg-gold h-full rounded-full" style={{width: '85%'}}></div></div>
                                        </div>
                                        <div>
                                            <div className="flex justify-between text-sm font-bold mb-2"><span>研讨会中的“死寂”</span><span>72%</span></div>
                                            <div className="w-full bg-slate-200 h-2 rounded-full"><div className="bg-medieval-indigo h-full rounded-full" style={{width: '72%'}}></div></div>
                                        </div>
                                    </div>
                                </div>
                                <div className="glass-panel rounded-3xl p-10 flex flex-col justify-center border-t-4 border-medieval-indigo">
                                    <Icon name="MessageSquare" className="text-medieval-indigo mb-4" />
                                    <p className="text-xl text-slate-600 italic font-serif leading-relaxed border-l-4 border-gold/20 pl-6">
                                        "并不是我没有想法。而是课堂上的‘圆桌’感觉像个舞台，如果我的英语不完美，我不敢踏上去。"
                                    </p>
                                </div>
                            </div>
                        </section>

                        {/* Prototype */}
                        <section id="prototype">
                            <SectionHeader title="魔法之镜" subtitle="窥见数字圆桌的未来。" iconName="Terminal" />
                            <div className="glass-panel rounded-[48px] overflow-hidden shadow-2xl border-4 border-white max-w-4xl mx-auto">
                                <div className="bg-medieval-indigo p-5 flex items-center justify-between">
                                    <div className="flex gap-2"><div className="w-3 h-3 rounded-full bg-red-500" /><div className="w-3 h-3 rounded-full bg-gold" /><div className="w-3 h-3 rounded-full bg-green-500" /></div>
                                    <span className="text-xs text-indigo-200 font-mono">RoundTable OS v1.0</span>
                                    <div className="w-10"></div>
                                </div>
                                <div className="h-[400px] p-8 overflow-y-auto space-y-6 bg-[#FAF9F6]">
                                    <div className="flex gap-4">
                                        <div className="w-10 h-10 rounded-xl bg-slate-200" />
                                        <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 text-sm">
                                            <strong className="text-medieval-indigo block mb-1">Dr. Sarah:</strong>
                                            "谁能分析一下英国脱欧对 XJTLU 研究的影响？"
                                        </div>
                                    </div>
                                    <div className="flex gap-4 flex-row-reverse">
                                        <div className="w-10 h-10 rounded-xl bg-gold flex items-center justify-center shadow-lg"><Icon name="Sparkles" className="text-white" /></div>
                                        <div className="bg-gold/5 p-4 rounded-2xl italic border-2 border-gold/20 text-sm">
                                            <strong className="text-gold block mb-1">破冰代理 (私密):</strong>
                                            "一飞，我注意到你对‘协作’有一些想法。想分享一下吗？我可以帮你润色英语！"
                                        </div>
                                    </div>
                                </div>
                                <div className="p-6 bg-white border-t border-gold/10 flex gap-3">
                                    <input type="text" placeholder="向圆桌低语..." className="flex-1 bg-slate-50 border-2 border-slate-100 rounded-2xl px-6 py-4 text-sm outline-none font-serif italic" />
                                    <button className="bg-medieval-indigo text-gold px-8 py-4 rounded-2xl font-bold">发言</button>
                                </div>
                            </div>
                        </section>

                        {/* Team */}
                        <section id="team">
                            <SectionHeader title="圆桌骑士团" subtitle="项目背后的愿景家们。" iconName="Users" />
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                                <TeamMember name="Qian Wang" id="2362229" role="UI/UX 设计" image="https://picsum.photos/seed/1/200" />
                                <TeamMember name="Zengyi Mei" id="2361796" role="用户研究" image="https://picsum.photos/seed/2/200" />
                                <TeamMember name="Haoyu Shen" id="2361328" role="开发者" image="https://picsum.photos/seed/3/200" />
                                <TeamMember name="Chenye Zhao" id="2361582" role="项目经理" image="https://picsum.photos/seed/4/200" />
                            </div>
                        </section>
                    </main>

                    <footer className="py-20 text-center bg-medieval-indigo text-white">
                        <div className="flex items-center justify-center gap-3 mb-4">
                            <Icon name="Shield" className="text-gold" />
                            <span className="font-serif font-bold text-2xl italic">Round Table</span>
                        </div>
                        <p className="text-indigo-200 text-sm">© 2026 Round Table Project • XJTLU</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
