<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Round Table - Digital Sanctuary for Seminar Equality</title>
    <!-- 引入字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- 引入 Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入外部样式 -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="antialiased">

    <!-- 导航栏占位 -->
    <div id="nav-placeholder"></div>

    <main class="max-w-7xl mx-auto px-6 py-28 space-y-40">
        <!-- 各个 Section 占位 -->
        <div id="hero-placeholder"></div>
        <div id="motivation-placeholder"></div>
        <div id="research-placeholder"></div>
        <div id="review-placeholder"></div>
        <div id="personas-placeholder"></div>
        <div id="journey-placeholder"></div>        
        <div id="requirements-placeholder"></div>
        <div id="ideation-placeholder"></div>
        <div id="prototype-placeholder"></div>
        <div id="evaluation-placeholder"></div>
        <div id="team-placeholder"></div>
    </main>

    <!-- 底部占位 -->
    <div id="footer-placeholder"></div>

    <!-- 引入外部JS -->
    <script src="main.js"></script>
</body>
</html>
